services:
  postgres:
    image: postgres:16-alpine
    container_name: quantum-postgres
    ports:
      - "127.0.0.1:15432:5432"
    environment:
      POSTGRES_USER: quantum
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quantum}
      POSTGRES_DB: quantumdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantum -d quantumdb"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - quantum-network

  redis:
    image: redis:7-alpine
    container_name: quantum-redis
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - quantum-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: quantum:latest
    container_name: quantum
    ports:
      - "127.0.0.1:18080:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://quantum:${POSTGRES_PASSWORD:-quantum}@postgres:5432/quantumdb}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # SECRET_KEY: ${SECRET_KEY}   # optionnel en local; en prod on le met
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:8000/docs',timeout=2); sys.exit(0 if 200<=getattr(r,'status',200)<400 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - quantum-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: quantumn3bula_api-frontend
    container_name: quantum-nebula-frontend
    ports:
      - "127.0.0.1:13000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - quantum-network

  n8n:
    image: n8nio/n8n:latest
    container_name: quantum-n8n
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - quantum-network

networks:
  quantum-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  n8n_data:
